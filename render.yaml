# ============================================================
# Render Blueprint — Noogo Backend
# Docs : https://docs.render.com/blueprint-spec
# Deploy : render.com > New > Blueprint > connect repo
# ============================================================

databases:
  - name: noogo-db
    plan: free # starter pour production payante
    databaseName: noogo
    user: noogo
    postgresMajorVersion: "16"

services:
  - type: web
    name: noogo-backend
    runtime: docker
    plan: free # starter pour production payante
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: develop
    healthCheckPath: /healthcheck
    envVars:
      - key: APP_NAME
        value: Noogo
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://noogo-backend-zn2v.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: noogo-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: FRONTEND_URL
        value: https://noogo-dashboard.netlify.app
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
