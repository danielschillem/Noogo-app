daemon off;
user www-data;
worker_processes auto;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;
    client_body_temp_path /tmp/nginx_client_body 1 2;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Health check serversideup (s6-overlay) — doit retourner 200
        location = /healthcheck {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Laravel SPA / API routing
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM — serversideup écoute sur 127.0.0.1:9000 par défaut
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Bloquer les fichiers cachés
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
