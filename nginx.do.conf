user  www-data;
worker_processes auto;

error_log /dev/stderr warn;
pid       /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile   on;
    keepalive_timeout 65;
    client_max_body_size 100M;
    client_body_temp_path /tmp/nginx_client_body 1 2;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript
               application/json image/svg+xml application/xml;

    server {
        listen 8080;
        server_name _;

        # ── Health check ──────────────────────────────────────────
        location = /healthcheck {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── Fichiers publics Laravel (storage symlink) ────────────
        location /storage/ {
            alias /var/www/html/public/storage/;
            try_files $uri =404;
            expires 7d;
        }

        # ── API Laravel + Sanctum → PHP-FPM ──────────────────────
        location ~ ^/(api|sanctum)(/|$) {
            root /var/www/html/public;
            try_files $uri /index.php?$query_string;
        }

        # ── Handler PHP-FPM ──────────────────────────────────────
        location ~ \.php$ {
            root /var/www/html/public;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # ── Assets React (JS/CSS/images) avec cache long ─────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|map)$ {
            root /var/www/html/public/dashboard;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── React SPA — toutes les autres routes → index.html ────
        location / {
            root /var/www/html/public/dashboard;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # ── Bloquer les fichiers cachés ───────────────────────────
        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
