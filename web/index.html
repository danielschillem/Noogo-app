<!DOCTYPE html>
<html>
  <head>

      Exemple : <base href="/noogo/">
    -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Application de scan Noogo" />

    <!-- ✅ Autoriser la caméra sur le web -->
    <meta

      content="camera=(self), microphone=(), geolocation=()"
    />

    <!-- ✅ PWA et mobile -->
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Noogo" />

    <script src="flutter_bootstrap.js" async></script>
