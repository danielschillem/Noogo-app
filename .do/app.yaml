# =============================================================
# DigitalOcean App Platform — Noogo
# Backend Laravel (PHP-FPM) + Frontend React servis dans le même
# conteneur Docker → un seul webservice, un seul domaine.
#
# Documentation : https://docs.digitalocean.com/products/app-platform/
# Déploiement   : doctl apps create --spec .do/app.yaml
#              ou : DO Console > Apps > New > GitHub > (auto-détecté)
# =============================================================

# App ID DO : 1c0cd0a8-ee73-4efd-aa41-5906cf04644d
# Console   : https://cloud.digitalocean.com/apps/1c0cd0a8-ee73-4efd-aa41-5906cf04644d
spec:
  name: noogo
  region: fra           # Frankfurt

  # ── Base de données managée PostgreSQL ──────────────────────
  databases:
    - name: noogo-db
      engine: PG
      version: "16"
      # dev-database = plan gratuit (partagé, non-production)
      # Pour la production : remplacer par db-s-1vcpu-1gb
      size: db-s-dev-database
      num_nodes: 1

  # ── Service web unique (backend + frontend) ─────────────────
  services:
    - name: noogo-app
      # Dockerfile à la racine du dépôt
      dockerfile_path: Dockerfile
      source_dir: /

      # ── Source GitHub ──────────────────────────────────────
      # ⚠ Déploiement auto **uniquement** sur push vers cette branche (pas main).
      #    Pour livrer : merger/pousser sur develop, ou lancer le workflow
      #    « Trigger DigitalOcean Deploy » (secrets DO requis).
      github:
        repo: danielschillem/Noogo-app
        branch: develop
        deploy_on_push: true

      # ── Ressources ────────────────────────────────────────
      # apps-s-1vcpu-0.5gb = Basic (512 MB RAM, 1 vCPU) — dev
      # apps-s-1vcpu-1gb   = Basic (1 GB RAM, 1 vCPU) — prod
      instance_size_slug: apps-s-1vcpu-0.5gb
      instance_count: 1

      # ── Réseau ────────────────────────────────────────────
      http_port: 8080

      # ── Health check ──────────────────────────────────────
      health_check:
        # IMPORTANT: vérifier l'app Laravel réelle (pas seulement nginx)
        # pour empêcher qu'un conteneur "vivant" mais API cassée passe en prod.
        http_path: /api/health
        initial_delay_seconds: 30
        period_seconds: 30
        timeout_seconds: 10
        success_threshold: 1
        failure_threshold: 3

      # ── Variables d'environnement ──────────────────────────
      envs:
        - key: APP_NAME
          value: Noogo
          scope: RUN_TIME

        - key: APP_ENV
          value: production
          scope: RUN_TIME

        - key: APP_DEBUG
          value: "false"
          scope: RUN_TIME

        - key: APP_URL
          value: https://noogo-e5ygx.ondigitalocean.app
          scope: RUN_TIME

        # Clé générée automatiquement au déploiement initial
        - key: APP_KEY
          value: base64:Sa+WzC3jRM9FlvjIg8OgSCvaZ6MGBcitznNj9AS4U3A=
          type: SECRET
          scope: RUN_TIME

        # Base de données — cluster standalone DO (DATABASE_URL et DB_ADMIN_URL injectés via API)
        - key: DB_CONNECTION
          value: pgsql
          scope: RUN_TIME

        # DATABASE_URL = user applicatif noogo-db (injecté via API comme SECRET)
        - key: DATABASE_URL
          value: ${noogo-db.DATABASE_URL}
          scope: RUN_TIME

        - key: DB_SSLMODE
          value: require
          scope: RUN_TIME

        # FRONTEND_URL = même domaine (backend et frontend unifiés)
        - key: FRONTEND_URL
          value: https://noogo-e5ygx.ondigitalocean.app
          scope: RUN_TIME

        - key: LOG_CHANNEL
          value: stderr
          scope: RUN_TIME

        - key: SESSION_DRIVER
          value: cookie
          scope: RUN_TIME

        - key: CACHE_STORE
          value: file
          scope: RUN_TIME

        - key: FILESYSTEM_DISK
          value: public
          scope: RUN_TIME

        # ── Pusher (temps réel — activé en production) ───────
        - key: BROADCAST_CONNECTION
          value: pusher
          scope: RUN_TIME

        - key: PUSHER_APP_KEY
          value: c1ae7868685df7094dd2
          scope: RUN_TIME

        - key: PUSHER_APP_CLUSTER
          value: eu
          scope: RUN_TIME

        # ⚠ Renseigner PUSHER_APP_ID et PUSHER_APP_SECRET dans
        #   le panneau DigitalOcean → App → Settings → Env Vars
        #   (ne jamais committer ces valeurs secrètes dans ce fichier)
        # - key: PUSHER_APP_ID
        #   value: <valeur dans DO console>
        #   type: SECRET
        #   scope: RUN_TIME
        # - key: PUSHER_APP_SECRET
        #   value: <valeur dans DO console>
        #   type: SECRET
        #   scope: RUN_TIME

        # ── Cloudflare R2 (médias persistants) ────────────────
        # Active R2 en définissant ces variables dans DO.
        # Dès que CLOUDFLARE_R2_ENDPOINT est non vide, l'app stocke/lit
        # les images sur le disque "r2" (au lieu du disque local éphémère).
        # - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        #   value: <R2 access key id>
        #   type: SECRET
        #   scope: RUN_TIME
        # - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        #   value: <R2 secret access key>
        #   type: SECRET
        #   scope: RUN_TIME
        # - key: CLOUDFLARE_R2_BUCKET
        #   value: noogo-media
        #   scope: RUN_TIME
        # - key: CLOUDFLARE_R2_ENDPOINT
        #   value: https://<account-id>.r2.cloudflarestorage.com
        #   scope: RUN_TIME
        # - key: CLOUDFLARE_R2_PUBLIC_URL
        #   value: https://<public-bucket-domain>
        #   scope: RUN_TIME

