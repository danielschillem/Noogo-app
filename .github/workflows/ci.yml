# ============================================================
# CI — Noogo Flutter
# Déclencheurs :
#   • Push sur main / develop
#   • Toute Pull Request vers main
# Étapes :
#   1. Analyse statique (flutter analyze)
#   2. Tests unitaires (flutter test)
#   3. Build web (smoke-test : s'assure que le code compile)
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # Annule les runs redondants sur la même branche

jobs:
  # ── 1. Analyse + Tests ──────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # .env minimal pour que flutter_dotenv ne plante pas
      - name: Create .env stub
        run: |
          mkdir -p assets/env
          echo "API_BASE_URL=https://noogo-backend-zn2v.onrender.com/api" > assets/env/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false   # Ne fait pas échouer le CI si Codecov est down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Build web (smoke-test) ───────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Create .env stub
        run: |
          mkdir -p assets/env
          echo "API_BASE_URL=https://noogo-backend-zn2v.onrender.com/api" > assets/env/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --no-tree-shake-icons
