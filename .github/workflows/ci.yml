# ============================================================
# CI — Noogo Flutter
# Déclencheurs :
#   • Push sur main / develop
#   • Toute Pull Request vers main
# Étapes :
#   1. Analyse statique (flutter analyze)
#   2. Tests unitaires (flutter test)
#   3. Build web (smoke-test : s'assure que le code compile)
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # Annule les runs redondants sur la même branche

jobs:
  # ── 0. Préflight backend Laravel (fail-fast bootstrap) ─────────
  backend-preflight:
    name: Backend Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Install backend dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare .env for CI
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Laravel bootstrap preflight
        run: |
          php artisan package:discover --ansi
          php artisan config:cache --ansi
          php artisan route:list --path=api/health --ansi > /dev/null

  # ── 1. Analyse + Tests ──────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    needs: backend-preflight
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # .env minimal pour que flutter_dotenv ne plante pas
      - name: Create .env stub
        run: |
          mkdir -p assets/env
          echo "API_BASE_URL=https://noogo-e5ygx.ondigitalocean.app/api" > assets/env/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false   # Ne fait pas échouer le CI si Codecov est down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Build web (smoke-test) ───────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Create .env stub
        run: |
          mkdir -p assets/env
          echo "API_BASE_URL=https://noogo-e5ygx.ondigitalocean.app/api" > assets/env/.env

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --no-tree-shake-icons
