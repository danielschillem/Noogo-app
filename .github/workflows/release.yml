# ============================================================
# RELEASE — Noogo Flutter Android (Play Store AAB)
# Déclencheur : push d'un tag semver (ex: v1.2.3)
#
# Secrets GitHub requis :
#   KEYSTORE_BASE64      → base64 du fichier noogo-release.jks
#   KEYSTORE_PASSWORD    → storePassword
#   KEY_ALIAS            → keyAlias (noogo)
#   KEY_PASSWORD         → keyPassword
#   GOOGLE_PLAY_JSON     → contenu du JSON Service Account GPC
#   FIREBASE_OPTIONS     → contenu de google-services.json (base64)
#   DOTENV_PROD          → contenu du .env de production
#
# Pour encoder le keystore :
#   base64 -w 0 android/noogo-release.jks | pbcopy   (macOS)
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("android\noogo-release.jks")) | Set-Clipboard  (Windows)
# ============================================================
name: Release Android

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"    # v1.0.0, v2.3.1 …

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false          # Ne jamais annuler un release

jobs:
  build-android:
    name: Build & Upload AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Flutter ───────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # ── JDK pour Gradle ───────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── Secrets → fichiers ────────────────────────────────
      - name: Restore .env production
        run: |
          mkdir -p assets/env
          echo "${{ secrets.DOTENV_PROD }}" > assets/env/.env

      - name: Restore google-services.json
        run: |
          echo "${{ secrets.FIREBASE_OPTIONS }}" | base64 --decode > android/app/google-services.json

      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/noogo-release.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../noogo-release.jks
          EOF

      # ── Version depuis le tag ─────────────────────────────
      # Le tag v1.2.3 donne versionName=1.2.3 et versionCode basé sur
      # les composants du semver (1*10000 + 2*100 + 3 = 10203).
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"         # "1.2.3"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "name=$TAG"   >> "$GITHUB_OUTPUT"
          echo "code=$CODE"  >> "$GITHUB_OUTPUT"
          echo "▶ versionName=$TAG  versionCode=$CODE"

      # ── Build ─────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Build AAB (release)
        run: |
          flutter build appbundle \
            --release \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ steps.version.outputs.code }}" \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ── Artefacts ─────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: noogo-${{ steps.version.outputs.name }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug symbols (obfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ steps.version.outputs.name }}
          path: build/debug-info/
          retention-days: 90

      # ── Google Play (optionnel — nécessite secret GOOGLE_PLAY_JSON) ──
      - name: Upload to Play Store (internal track)
        if: ${{ secrets.GOOGLE_PLAY_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.quickdevit.noogo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: fastlane/metadata/android/fr-FR/changelogs

      # ── GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Noogo ${{ steps.version.outputs.name }}"
          files: build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
